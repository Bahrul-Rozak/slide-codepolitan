<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdgeOne Makers — Workshop #1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand: {
              50:  '#eff6ff',
              100: '#dbeafe',
              200: '#bfdbfe',
              300: '#93c5fd',
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#1e40af',
              900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.4; }
      100% { transform: scale(1.8); opacity: 0; }
    }
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slide-in-right {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .animate-float { animation: float 4s ease-in-out infinite; }
    .animate-pulse-ring { animation: pulse-ring 2.5s ease-out infinite; }
    .animate-fade-in-up { animation: fade-in-up 0.8s ease-out both; }
    .animate-slide-in-right { animation: slide-in-right 0.8s ease-out both; }
    .delay-100 { animation-delay: 0.1s; }
    .delay-200 { animation-delay: 0.2s; }
    .delay-300 { animation-delay: 0.3s; }
    .delay-400 { animation-delay: 0.4s; }
    .delay-500 { animation-delay: 0.5s; }
    .delay-600 { animation-delay: 0.6s; }
    .delay-700 { animation-delay: 0.7s; }
    .delay-800 { animation-delay: 0.8s; }

    .grid-bg {
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .gradient-text {
      background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #2563eb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body class="font-sans antialiased">

  <div class="relative w-screen h-screen overflow-hidden bg-white grid-bg">

    <!-- Decorative Elements -->
    <!-- Top-right blob -->
    <div class="absolute -top-32 -right-32 w-[500px] h-[500px] rounded-full bg-brand-100/60 blur-3xl pointer-events-none"></div>
    <!-- Bottom-left blob -->
    <div class="absolute -bottom-40 -left-40 w-[600px] h-[600px] rounded-full bg-brand-50/80 blur-3xl pointer-events-none"></div>
    <!-- Small accent blob -->
    <div class="absolute top-1/3 right-1/4 w-[200px] h-[200px] rounded-full bg-brand-200/30 blur-2xl pointer-events-none"></div>

    <!-- Dot pattern top-left -->
    <div class="absolute top-8 left-8 flex gap-2 opacity-30">
      <div class="w-1.5 h-1.5 rounded-full bg-brand-400"></div>
      <div class="w-1.5 h-1.5 rounded-full bg-brand-400"></div>
      <div class="w-1.5 h-1.5 rounded-full bg-brand-400"></div>
      <div class="w-1.5 h-1.5 rounded-full bg-brand-300"></div>
      <div class="w-1.5 h-1.5 rounded-full bg-brand-300"></div>
    </div>
    <div class="absolute top-[18px] left-8 flex gap-2 opacity-20">
      <div class="w-1.5 h-1.5 rounded-full bg-brand-400"></div>
      <div class="w-1.5 h-1.5 rounded-full bg-brand-300"></div>
      <div class="w-1.5 h-1.5 rounded-full bg-brand-300"></div>
      <div class="w-1.5 h-1.5 rounded-full bg-brand-200"></div>
      <div class="w-1.5 h-1.5 rounded-full bg-brand-200"></div>
    </div>

    <!-- Geometric lines -->
    <svg class="absolute top-0 right-0 w-[45%] h-full opacity-[0.06] pointer-events-none" viewBox="0 0 800 900" fill="none">
      <line x1="600" y1="0" x2="200" y2="900" stroke="#2563eb" stroke-width="1"/>
      <line x1="700" y1="0" x2="300" y2="900" stroke="#2563eb" stroke-width="1"/>
      <line x1="800" y1="0" x2="400" y2="900" stroke="#2563eb" stroke-width="1"/>
      <circle cx="400" cy="450" r="200" stroke="#2563eb" stroke-width="1" stroke-dasharray="8 8"/>
      <circle cx="400" cy="450" r="320" stroke="#2563eb" stroke-width="0.5" stroke-dasharray="4 12"/>
    </svg>

    <!-- Corner bracket top-left -->
    <div class="absolute top-6 left-6 w-12 h-12 border-l-2 border-t-2 border-brand-300/40 rounded-tl-lg"></div>
    <!-- Corner bracket bottom-right -->
    <div class="absolute bottom-6 right-6 w-12 h-12 border-r-2 border-b-2 border-brand-300/40 rounded-br-lg"></div>

    <!-- Main Content -->
    <div class="relative z-10 w-full h-full flex flex-col items-center justify-center px-6">

      <!-- Workshop Badge -->
      <div class="animate-fade-in-up delay-100 mb-8">
        <div class="inline-flex items-center gap-2.5 px-5 py-2 rounded-full bg-brand-50 border border-brand-200/80 shadow-sm shadow-brand-100">
          <span class="relative flex h-2.5 w-2.5">
            <span class="animate-pulse-ring absolute inline-flex h-full w-full rounded-full bg-brand-500"></span>
            <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-brand-500"></span>
          </span>
          <span class="text-brand-700 text-sm font-semibold tracking-wide uppercase">Workshop #1</span>
        </div>
      </div>

      <!-- Logo -->
      <div class="animate-fade-in-up delay-200 mb-8 relative">
        <div class="absolute inset-0 bg-brand-400/20 rounded-full blur-2xl scale-150"></div>
        <img
          src="https://avatars.githubusercontent.com/u/176978739?s=200&v=4"
          alt="EdgeOne Makers"
          class="relative w-20 h-20 rounded-full shadow-lg shadow-brand-200/50 ring-4 ring-white"
        />
      </div>

      <!-- Community Name -->
      <div class="animate-fade-in-up delay-300 mb-6">
        <p class="text-brand-600 text-sm font-semibold tracking-[0.2em] uppercase">EdgeOne Makers</p>
      </div>

      <!-- Main Title -->
      <div class="animate-fade-in-up delay-400 text-center max-w-4xl">
        <h1 class="text-5xl sm:text-6xl lg:text-7xl font-extrabold leading-[1.08] tracking-tight text-gray-900">
          Zero to Hero
          <br/>
          <span class="gradient-text">Deploy AI Agent</span>
          <br/>
          <span class="text-gray-900">Pertama dalam</span>
          <span class="relative inline-block ml-3">
            <span class="gradient-text">5 Menit</span>
            <svg class="absolute -bottom-2 left-0 w-full" viewBox="0 0 200 12" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M2 8 C50 2, 150 2, 198 8" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
            </svg>
          </span>
        </h1>
      </div>

      <!-- Subtitle -->
      <div class="animate-fade-in-up delay-500 mt-8 text-center max-w-xl">
        <p class="text-gray-500 text-lg font-light leading-relaxed">
          Pelajari cara membangun dan men-deploy AI Agent pertamamu dari nol — tanpa ribet, langsung jalan.
        </p>
      </div>

      <!-- CTA / Info Pills -->
      <div class="animate-fade-in-up delay-600 mt-10 flex flex-wrap items-center justify-center gap-3">
        <div class="flex items-center gap-2 px-5 py-2.5 bg-brand-600 text-white rounded-full font-medium text-sm shadow-lg shadow-brand-500/25 hover:bg-brand-700 transition-colors cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          Mulai Workshop
        </div>
        <div class="flex items-center gap-2 px-5 py-2.5 bg-white text-gray-600 rounded-full font-medium text-sm border border-gray-200 shadow-sm hover:border-brand-300 hover:text-brand-600 transition-colors cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          Gratis & Open
        </div>
      </div>

      <!-- Bottom Tags -->
      <div class="animate-fade-in-up delay-700 mt-14 flex flex-wrap items-center justify-center gap-2">
        <span class="px-3 py-1 text-xs font-medium text-brand-600 bg-brand-50 rounded-md border border-brand-100">EdgeOne</span>
        <span class="px-3 py-1 text-xs font-medium text-brand-600 bg-brand-50 rounded-md border border-brand-100">AI Agent</span>
        <span class="px-3 py-1 text-xs font-medium text-brand-600 bg-brand-50 rounded-md border border-brand-100">Serverless</span>
        <span class="px-3 py-1 text-xs font-medium text-brand-600 bg-brand-50 rounded-md border border-brand-100">Beginner Friendly</span>
        <span class="px-3 py-1 text-xs font-medium text-brand-600 bg-brand-50 rounded-md border border-brand-100">Hands-on</span>
      </div>
    </div>

    <!-- Bottom Bar -->
    <div class="absolute bottom-0 left-0 right-0 h-1 bg-gradient-to-r from-brand-400 via-brand-600 to-brand-400"></div>

    <!-- Floating decorative elements -->
    <div class="animate-float absolute top-[15%] left-[8%] w-3 h-3 rounded-full bg-brand-300/40"></div>
    <div class="animate-float absolute top-[25%] right-[12%] w-2 h-2 rounded-full bg-brand-400/30" style="animation-delay: 1s;"></div>
    <div class="animate-float absolute bottom-[20%] left-[15%] w-2.5 h-2.5 rounded-full bg-brand-200/50" style="animation-delay: 2s;"></div>
    <div class="animate-float absolute bottom-[30%] right-[8%] w-3.5 h-3.5 rounded-sm rotate-45 border border-brand-300/30" style="animation-delay: 0.5s;"></div>
    <div class="animate-float absolute top-[45%] left-[4%] w-4 h-4 rounded-sm rotate-12 border border-brand-200/40" style="animation-delay: 1.5s;"></div>

  </div>

</body>
</html>
