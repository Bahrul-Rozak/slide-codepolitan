<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdgeOne Makers — Workshop #2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand: {
              50:  '#eff6ff',
              100: '#dbeafe',
              200: '#bfdbfe',
              300: '#93c5fd',
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#1e40af',
              900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.4; }
      100% { transform: scale(1.8); opacity: 0; }
    }
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes draw-line {
      from { stroke-dashoffset: 600; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes fade-in-scale {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-float { animation: float 4s ease-in-out infinite; }
    .animate-pulse-ring { animation: pulse-ring 2.5s ease-out infinite; }
    .animate-fade-in-up { animation: fade-in-up 0.8s ease-out both; }
    .animate-fade-in-scale { animation: fade-in-scale 0.6s ease-out both; }
    .animate-draw-line { stroke-dasharray: 600; animation: draw-line 2s ease-out both; }
    .delay-100 { animation-delay: 0.1s; }
    .delay-200 { animation-delay: 0.2s; }
    .delay-300 { animation-delay: 0.3s; }
    .delay-400 { animation-delay: 0.4s; }
    .delay-500 { animation-delay: 0.5s; }
    .delay-600 { animation-delay: 0.6s; }
    .delay-700 { animation-delay: 0.7s; }
    .delay-800 { animation-delay: 0.8s; }
    .delay-1000 { animation-delay: 1.0s; }
    .delay-1200 { animation-delay: 1.2s; }

    .grid-bg {
      background-image:
        linear-gradient(rgba(59,130,246,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.035) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .gradient-text {
      background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #2563eb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card-glow {
      box-shadow:
        0 0 0 1px rgba(59,130,246,0.08),
        0 4px 24px -4px rgba(59,130,246,0.12),
        0 1px 3px rgba(0,0,0,0.04);
    }
  </style>
</head>
<body class="font-sans antialiased">

  <div class="relative w-screen h-screen overflow-hidden bg-white grid-bg">

    <!-- Decorative Blobs -->
    <div class="absolute -top-40 -left-40 w-[500px] h-[500px] rounded-full bg-brand-100/50 blur-3xl pointer-events-none"></div>
    <div class="absolute -bottom-32 -right-32 w-[550px] h-[550px] rounded-full bg-brand-50/70 blur-3xl pointer-events-none"></div>
    <div class="absolute top-1/4 left-1/3 w-[250px] h-[250px] rounded-full bg-brand-200/20 blur-2xl pointer-events-none"></div>

    <!-- Geometric SVG — different from #1 -->
    <svg class="absolute top-0 left-0 w-[40%] h-full opacity-[0.05] pointer-events-none" viewBox="0 0 700 900" fill="none">
      <rect x="100" y="150" width="300" height="300" rx="8" stroke="#2563eb" stroke-width="1" transform="rotate(15 250 300)"/>
      <rect x="150" y="200" width="300" height="300" rx="8" stroke="#2563eb" stroke-width="0.5" transform="rotate(15 300 350)" stroke-dasharray="6 6"/>
      <line x1="0" y1="450" x2="700" y2="450" stroke="#2563eb" stroke-width="0.5" stroke-dasharray="4 8"/>
    </svg>

    <!-- Corner brackets — mirrored from #1 -->
    <div class="absolute top-6 right-6 w-12 h-12 border-r-2 border-t-2 border-brand-300/40 rounded-tr-lg"></div>
    <div class="absolute bottom-6 left-6 w-12 h-12 border-l-2 border-b-2 border-brand-300/40 rounded-bl-lg"></div>

    <!-- Dot pattern bottom-right -->
    <div class="absolute bottom-10 right-10 grid grid-cols-5 gap-2 opacity-20">
      <div class="w-1 h-1 rounded-full bg-brand-400"></div>
      <div class="w-1 h-1 rounded-full bg-brand-400"></div>
      <div class="w-1 h-1 rounded-full bg-brand-400"></div>
      <div class="w-1 h-1 rounded-full bg-brand-300"></div>
      <div class="w-1 h-1 rounded-full bg-brand-300"></div>
      <div class="w-1 h-1 rounded-full bg-brand-400"></div>
      <div class="w-1 h-1 rounded-full bg-brand-300"></div>
      <div class="w-1 h-1 rounded-full bg-brand-300"></div>
      <div class="w-1 h-1 rounded-full bg-brand-200"></div>
      <div class="w-1 h-1 rounded-full bg-brand-200"></div>
      <div class="w-1 h-1 rounded-full bg-brand-300"></div>
      <div class="w-1 h-1 rounded-full bg-brand-300"></div>
      <div class="w-1 h-1 rounded-full bg-brand-200"></div>
      <div class="w-1 h-1 rounded-full bg-brand-200"></div>
      <div class="w-1 h-1 rounded-full bg-brand-100"></div>
    </div>

    <!-- Floating decorative elements -->
    <div class="animate-float absolute top-[12%] right-[10%] w-3 h-3 rounded-full bg-brand-300/40"></div>
    <div class="animate-float absolute top-[60%] left-[6%] w-2 h-2 rounded-full bg-brand-400/30" style="animation-delay: 1.2s;"></div>
    <div class="animate-float absolute bottom-[25%] right-[18%] w-2.5 h-2.5 rounded-full bg-brand-200/50" style="animation-delay: 2s;"></div>
    <div class="animate-float absolute top-[35%] left-[12%] w-3.5 h-3.5 rounded-sm rotate-45 border border-brand-200/40" style="animation-delay: 0.5s;"></div>
    <div class="animate-float absolute bottom-[35%] right-[6%] w-4 h-4 rounded-sm rotate-12 border border-brand-300/30" style="animation-delay: 1.8s;"></div>

    <!-- Main Content -->
    <div class="relative z-10 w-full h-full flex flex-col items-center justify-center px-6">

      <!-- Workshop Badge -->
      <div class="animate-fade-in-up delay-100 mb-8">
        <div class="inline-flex items-center gap-2.5 px-5 py-2 rounded-full bg-brand-50 border border-brand-200/80 shadow-sm shadow-brand-100">
          <span class="relative flex h-2.5 w-2.5">
            <span class="animate-pulse-ring absolute inline-flex h-full w-full rounded-full bg-brand-500"></span>
            <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-brand-500"></span>
          </span>
          <span class="text-brand-700 text-sm font-semibold tracking-wide uppercase">Workshop #2</span>
        </div>
      </div>

      <!-- Logo -->
      <div class="animate-fade-in-up delay-200 mb-8 relative">
        <div class="absolute inset-0 bg-brand-400/20 rounded-full blur-2xl scale-150"></div>
        <img
          src="https://avatars.githubusercontent.com/u/176978739?s=200&v=4"
          alt="EdgeOne Makers"
          class="relative w-20 h-20 rounded-full shadow-lg shadow-brand-200/50 ring-4 ring-white"
        />
      </div>

      <!-- Community Name -->
      <div class="animate-fade-in-up delay-300 mb-8">
        <p class="text-brand-600 text-sm font-semibold tracking-[0.2em] uppercase">EdgeOne Makers</p>
      </div>

      <!-- Connector visual: Web + Agent -->
      <div class="animate-fade-in-scale delay-400 mb-8 flex items-center gap-4">
        <!-- Web Pill -->
        <div class="flex items-center gap-2 px-4 py-2 rounded-xl bg-white card-glow">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-brand-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9"/>
          </svg>
          <span class="text-gray-700 text-sm font-semibold">Web</span>
        </div>

        <!-- Plus / Connector -->
        <div class="relative">
          <svg class="w-8 h-8 text-brand-400" viewBox="0 0 32 32" fill="none">
            <line x1="16" y1="4" x2="16" y2="28" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="animate-draw-line" style="stroke-dasharray: 24;"/>
            <line x1="4" y1="16" x2="28" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="animate-draw-line delay-300" style="stroke-dasharray: 24;"/>
          </svg>
        </div>

        <!-- Agent Pill -->
        <div class="flex items-center gap-2 px-4 py-2 rounded-xl bg-white card-glow">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-brand-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0112 15a9.065 9.065 0 00-6.23.693L5 14.5m14.8.8l1.402 1.402c1.232 1.232.65 3.318-1.067 3.611A48.309 48.309 0 0112 21c-2.773 0-5.491-.235-8.135-.687-1.718-.293-2.3-2.379-1.067-3.61L5 14.5"/>
          </svg>
          <span class="text-gray-700 text-sm font-semibold">Agent</span>
        </div>
      </div>

      <!-- Main Title -->
      <div class="animate-fade-in-up delay-500 text-center max-w-4xl">
        <h1 class="text-5xl sm:text-6xl lg:text-7xl font-extrabold leading-[1.08] tracking-tight text-gray-900">
          Full-Stack AI
          <br/>
          <span class="gradient-text">Web + Agent</span>
          <br/>
          <span class="text-gray-900">dalam</span>
          <span class="relative inline-block mx-2">
            <span class="gradient-text">Satu Project</span>
            <svg class="absolute -bottom-2 left-0 w-full" viewBox="0 0 260 12" fill="none">
              <path d="M2 8 C60 2, 200 2, 258 8" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
            </svg>
          </span>
        </h1>
      </div>

      <!-- Subtitle -->
      <div class="animate-fade-in-up delay-600 mt-8 text-center max-w-xl">
        <p class="text-gray-500 text-lg font-light leading-relaxed">
          Gabungkan frontend, backend, dan AI Agent ke dalam satu proyek utuh — siap deploy ke produksi.
        </p>
      </div>

      <!-- CTA Buttons -->
      <div class="animate-fade-in-up delay-700 mt-10 flex flex-wrap items-center justify-center gap-3">
        <div class="flex items-center gap-2 px-5 py-2.5 bg-brand-600 text-white rounded-full font-medium text-sm shadow-lg shadow-brand-500/25 hover:bg-brand-700 transition-colors cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          Mulai Workshop
        </div>
        <div class="flex items-center gap-2 px-5 py-2.5 bg-white text-gray-600 rounded-full font-medium text-sm border border-gray-200 shadow-sm hover:border-brand-300 hover:text-brand-600 transition-colors cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          Lihat Repo
        </div>
      </div>

      <!-- Bottom Tags -->
      <div class="animate-fade-in-up delay-800 mt-14 flex flex-wrap items-center justify-center gap-2">
        <span class="px-3 py-1 text-xs font-medium text-brand-600 bg-brand-50 rounded-md border border-brand-100">Next.js</span>
        <span class="px-3 py-1 text-xs font-medium text-brand-600 bg-brand-50 rounded-md border border-brand-100">AI Agent</span>
        <span class="px-3 py-1 text-xs font-medium text-brand-600 bg-brand-50 rounded-md border border-brand-100">EdgeOne</span>
        <span class="px-3 py-1 text-xs font-medium text-brand-600 bg-brand-50 rounded-md border border-brand-100">Full-Stack</span>
        <span class="px-3 py-1 text-xs font-medium text-brand-600 bg-brand-50 rounded-md border border-brand-100">Monorepo</span>
        <span class="px-3 py-1 text-xs font-medium text-brand-600 bg-brand-50 rounded-md border border-brand-100">Production</span>
      </div>
    </div>

    <!-- Bottom Bar -->
    <div class="absolute bottom-0 left-0 right-0 h-1 bg-gradient-to-r from-brand-400 via-brand-600 to-brand-400"></div>

  </div>

</body>
</html>
